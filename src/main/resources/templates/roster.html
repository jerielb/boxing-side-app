<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Roster</title>
</head>
<body style="height:90vh; background-image: url('/static/background.png'); background-repeat: no-repeat; background-size: cover;"
      th:style="'background:url(' + @{/background.png} + '); background-repeat: no-repeat; background-size: cover;'">
    <header class="mt-2 p-2">
        <a href="index.html" th:href="@{/index}">
            <img class="mx-auto d-block" style="width:80; height:80px;" src="/static/logo.png" th:src="@{/logo.png}" alt="logo"/>
        </a>
    </header>
    <main class="p-3" style="height:85vh;">
        <div class="row h-10">
            <button class="btn btn-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#staticBackdrop" aria-controls="staticBackdrop">
                Filter Weight Classes
            </button>

            <div class="offcanvas offcanvas-start text-bg-dark" data-bs-backdrop="static" tabindex="-1" id="staticBackdrop" aria-labelledby="staticBackdropLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="staticBackdropLabel">Weight Classes</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <form>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="0" id="heavyweight">
                            <label class="form-check-label" for="heavyweight">Heavyweight</label>
                        </div>
                        <!--                <div class="form-check">-->
                        <!--                    <input class="form-check-input" type="checkbox" value="1" id="cruiserweight">-->
                        <!--                    <label class="form-check-label" for="cruiserweight">CRUISERWEIGHT</label>-->
                        <!--                </div>-->
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="2" id="light_heavyweight">
                            <label class="form-check-label" for="light_heavyweight">Light Heavyweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="3" id="middleweight">
                            <label class="form-check-label" for="middleweight">Middleweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="4" id="welterweight">
                            <label class="form-check-label" for="welterweight">Welterweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="5" id="lightweight">
                            <label class="form-check-label" for="lightweight">Lightweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="6" id="featherweight">
                            <label class="form-check-label" for="featherweight">Featherweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="7" id="bantamweight">
                            <label class="form-check-label" for="bantamweight">Bantamweight</label>
                        </div>
                        <br>
                        <button type="submit" class="btn btn-secondary">Filter</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="text-center row h-90 pt-3">






            <div id="carouselExampleIndicators" class="carousel slide">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                                        <div class="row text-warning" style="height:250px;">
                                            <div class="col spacer"></div>
                                            <div class="col border">boxer_1a</div>
                                            <div class="col border">boxer_2a</div>
                                            <div class="col border">boxer_3a</div>
                                            <div class="col border">boxer_4a</div>
                                            <div class="col border">boxer_5a</div>
                                            <div class="col spacer"></div>
                                        </div>
                                        <div class="row text-warning" style="height:250px;">
                                            <div class="col spacer"></div>
                                            <div class="col border">boxer_6a</div>
                                            <div class="col border">boxer_7a</div>
                                            <div class="col border">boxer_8a</div>
                                            <div class="col border">boxer_9a</div>
                                            <div class="col border">boxer_10a</div>
                                            <div class="col spacer"></div>
                                        </div><br><br>
                    </div>
                    <div class="carousel-item">
                                        <div class="row text-warning" style="height:250px;">
                                            <div class="col spacer"></div>
                                            <div class="col border">boxer_1b</div>
                                            <div class="col border">boxer_2b</div>
                                            <div class="col border">boxer_3b</div>
                                            <div class="col border">boxer_4b</div>
                                            <div class="col border">boxer_5b</div>
                                            <div class="col spacer"></div>
                                        </div>
                                        <div class="row text-warning" style="height:250px;">
                                            <div class="col spacer"></div>
                                            <div class="col border">boxer_6b</div>
                                            <div class="col border">boxer_7b</div>
                                            <div class="col border">boxer_8b</div>
                                            <div class="col border">boxer_9b</div>
                                            <div class="col border">boxer_10b</div>
                                            <div class="col spacer"></div>
                                        </div><br><br>
                    </div>
                    <div class="carousel-item">
                                        <div class="row text-warning" style="height:250px;">
                                            <div class="col spacer"></div>
                                            <div class="col border">boxer_1c</div>
                                            <div class="col border">boxer_2c</div>
                                            <div class="col border">boxer_3c</div>
                                            <div class="col border">boxer_4c</div>
                                            <div class="col border">boxer_5c</div>
                                            <div class="col spacer"></div>
                                        </div>
                                        <div class="row text-warning" style="height:250px;">
                                            <div class="col spacer"></div>
                                            <div class="col border">boxer_6c</div>
                                            <div class="col border">boxer_7c</div>
                                            <div class="col border">boxer_8c</div>
                                            <div class="col border">boxer_9c</div>
                                            <div class="col border">boxer_10c</div>
                                            <div class="col spacer"></div>
                                        </div><br><br>
                    </div>
                </div>
                
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev" style="width:100px">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next" style="width:100px">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>

                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
