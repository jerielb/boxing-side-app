<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Roster</title>
</head>
<body style="height:90vh; background-image: url('/static/background.png'); background-repeat: no-repeat; background-size: cover;"
      th:style="'background:url(' + @{/background.png} + '); background-repeat: no-repeat; background-size: cover;'">
    <header class="mt-2 p-2">
        <a href="index.html" th:href="@{/index}">
            <img class="mx-auto d-block" style="width:80; height:80px;" src="/static/logo.png" th:src="@{/logo.png}" alt="logo"/>
        </a>
    </header>
    <main class="p-3" style="height:85vh;">
        <div class="row h-10">
            <button class="btn btn-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#staticBackdrop" aria-controls="staticBackdrop">
                Filter Weight Classes
            </button>

            <div class="offcanvas offcanvas-start text-bg-dark" data-bs-backdrop="static" tabindex="-1" id="staticBackdrop" aria-labelledby="staticBackdropLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="staticBackdropLabel">Weight Classes</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <form>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="0" id="heavyweight">
                            <label class="form-check-label" for="heavyweight">Heavyweight</label>
                        </div>
                        <!--                <div class="form-check">-->
                        <!--                    <input class="form-check-input" type="checkbox" value="1" id="cruiserweight">-->
                        <!--                    <label class="form-check-label" for="cruiserweight">CRUISERWEIGHT</label>-->
                        <!--                </div>-->
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="2" id="light_heavyweight">
                            <label class="form-check-label" for="light_heavyweight">Light Heavyweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="3" id="middleweight">
                            <label class="form-check-label" for="middleweight">Middleweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="4" id="welterweight">
                            <label class="form-check-label" for="welterweight">Welterweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="5" id="lightweight">
                            <label class="form-check-label" for="lightweight">Lightweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="6" id="featherweight">
                            <label class="form-check-label" for="featherweight">Featherweight</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="7" id="bantamweight">
                            <label class="form-check-label" for="bantamweight">Bantamweight</label>
                        </div>
                        <br>
                        <button type="submit" class="btn btn-secondary">Filter</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="text-center row h-90 pt-3">
            <div class="col">
                <div class="row text-warning border border-success" style="height:250px;">
                    <div class="col border">col</div>
                    <div class="col border">col</div>
                    <div class="col border">col</div>
                    <div class="col border">col</div>
                    <div class="col border">col</div>
                </div>
                <div class="row text-warning border border-success" style="height:250px;">
                    <div class="col border">col</div>
                    <div class="col border">col</div>
                    <div class="col border">col</div>
                    <div class="col border">col</div>
                    <div class="col border">col</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
