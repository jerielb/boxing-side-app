<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Roster</title>
</head>
<body style="height:90vh; background-image: url('/static/background.png'); background-repeat: no-repeat; background-size: cover;"
      th:style="'background:url(' + @{/background.png} + '); background-repeat: no-repeat; background-size: cover;'">
    <header class="mt-2 p-2">
        <a href="index.html" th:href="@{/index}">
            <img class="mx-auto d-block" style="width:80; height:80px;" src="/static/logo.png" th:src="@{/logo.png}" alt="logo"/>
        </a>
    </header>
    <main class="p-3" style="height:85vh;">
        <div class="text-center row h-90 pt-3">
            <div id="carouselRosterDisplay" class="carousel slide">
                <div class="carousel-inner">
                    <div th:each="displayPage, stat : ${displayPages}">
                        <div class="carousel-item active" th:class="${stat.first} ? 'carousel-item active' : 'carousel-item'">
                            <div class="row text-warning" style="height:250px;">
                                <div class="col spacer"></div>
                                <div class="col border">
                                    <span th:text="${displayPage[0].boxerFirstName}">first</span>
                                    <span th:text="${displayPage[0].boxerLastName}">boxer</span>
                                </div>
                                <div class="col border">
                                    <span th:text="${displayPage[1].boxerFirstName}">second</span>
                                    <span th:text="${displayPage[1].boxerLastName}">boxer</span>
                                </div>
                                <div class="col border">
                                    <span th:text="${displayPage[2].boxerFirstName}">third</span>
                                    <span th:text="${displayPage[2].boxerLastName}">boxer</span>
                                </div>
                                <div class="col border">
                                    <span th:text="${displayPage[3].boxerFirstName}">fourth</span>
                                    <span th:text="${displayPage[3].boxerLastName}">boxer</span>
                                </div>
                                <div class="col border">
                                    <span th:text="${displayPage[4].boxerFirstName}">fifth</span>
                                    <span th:text="${displayPage[4].boxerLastName}">boxer</span>
                                </div>
                                <div class="col spacer"></div>
                            </div>
                            <div class="row text-warning" style="height:250px;">
                                <div class="col spacer"></div>
                                <div class="col border">
                                    <span th:text="${displayPage[5].boxerFirstName}">sixth</span>
                                    <span th:text="${displayPage[5].boxerLastName}">boxer</span>
                                </div>
                                <div class="col border">
                                    <span th:text="${displayPage[6].boxerFirstName}">seventh</span>
                                    <span th:text="${displayPage[6].boxerLastName}">boxer</span>
                                </div>
                                <div class="col border">
                                    <span th:text="${displayPage[7].boxerFirstName}">eighth</span>
                                    <span th:text="${displayPage[7].boxerLastName}">boxer</span>
                                </div>
                                <div class="col border">
                                    <span th:text="${displayPage[8].boxerFirstName}">ninth</span>
                                    <span th:text="${displayPage[8].boxerLastName}">boxer</span>
                                </div>
                                <div class="col border">
                                    <span th:text="${displayPage[9].boxerFirstName}">tenth</span>
                                    <span th:text="${displayPage[9].boxerLastName}">boxer</span>
                                </div>
                                <div class="col spacer"></div>
                            </div><br><br>
                        </div>
                    </div>
                </div>
                
                
                <ol class="carousel-indicators">
                    <li th:each="displayPage, stat : ${displayPages}">
                        <button type="button" data-bs-target="#carouselRosterDisplay" data-bs-slide-to="0" class="active"
                            th:data-bs-slide-to="${stat.index}" th:class="${stat.first} ? 'active' : ''"></button>
                    </li>
                </ol>
                
                
                <div th:if="${#lists.size(displayPages) > 1}">
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselRosterDisplay" data-bs-slide="prev" style="width:100px">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselRosterDisplay" data-bs-slide="next" style="width:100px">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
