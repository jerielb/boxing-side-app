<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <title>Boxing Side App</title>
</head>
<body style="height:90vh; background-image: url('/static/background.png'); background-repeat: no-repeat; background-size: cover;"
      th:style="'background:url(' + @{/background.png} + '); background-repeat: no-repeat; background-size: cover;'">
    <header class="mt-2 p-2">
        <a href="index.html" th:href="@{/index}">
            <img class="mx-auto d-block" style="width:80; height:80px;" src="/static/logo.png" th:src="@{/logo.png}" alt="logo"/>
        </a>
    </header>
    <main class="p-3" style="height:85vh;">
        <div class="mx-auto position-absolute top-50 start-50 translate-middle" style="width: 500px;">
            <div class="d-grid gap-1">
                <form method="post" action="tournament_select_boxer.html" th:action="@{/tournament_select_boxer}" th:object="${tournamentForm}">
                    <fieldset id="weightclass-selection">
                        <span class="form-check-label text-white fw-bold">Select Weight Class</span>
                        <div class="mb-3 text-white">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="flexRadioDefault" id="Heavyweight" value="heavyweight" th:field="*{weightClass}" checked>
                                <label class="form-check-label" for="Heavyweight">
                                    Heavyweight
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="flexRadioDefault" id="Light-Heavyweight" value="light-heavyweight" th:field="*{weightClass}">
                                <label class="form-check-label" for="Light-Heavyweight">
                                    Light Heavyweight
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="flexRadioDefault" id="Middleweight" value="middleweight" th:field="*{weightClass}">
                                <label class="form-check-label" for="Middleweight">
                                    Middleweight
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="flexRadioDefault" id="Welterweight" value="welterweight" th:field="*{weightClass}">
                                <label class="form-check-label" for="Welterweight">
                                    Welterweight
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="flexRadioDefault" id="Lightweight" value="lightweight" th:field="*{weightClass}">
                                <label class="form-check-label" for="Lightweight">
                                    Lightweight
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="flexRadioDefault" id="Featherweight" value="featherweight" th:field="*{weightClass}">
                                <label class="form-check-label" for="Featherweight">
                                    Featherweight
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="flexRadioDefault" id="Bantamweight" value="bantamweight" th:field="*{weightClass}">
                                <label class="form-check-label" for="Bantamweight">
                                    Bantamweight
                                </label>
                            </div>
                        </div>
                    </fieldset>
                    <br>
                    
                    <input type="submit" value="Continue" class="btn btn-outline-light">
                </form>
            </div>
        </div>
    </main>
</body>
</html>
